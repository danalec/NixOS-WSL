name: Tests

on:
  workflow_call: {}

jobs:
  prepare:
    name: Find Tests 🔍
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.tests.outputs.tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0

      - name: Install Nix ❄️
        uses: ./.github/actions/install-nix

      - name: Find Tests 🔍
        id: tests
        run: |
          find tests -name '*.Tests.ps1' -print0 | perl -pe 's|(.*?)\x0|"\1",|g;s|,$||;s|(.*)|tests=[\1]|' >> $GITHUB_OUTPUT

  tests:
    name: Test 🧪
    needs:
      - prepare
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJSON(needs.prepare.outputs.tests) }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0

      - name: Download Tarball 📥
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: tarball
          path: .

      - name: Setup WSL 🐧
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          try {
            wsl --update
          } catch {
            Write-Host "WSL update failed, continuing"
          }
          Get-Command wsl
          wsl --version

      - name: Execute Test 🧪
        shell: pwsh
        run: Invoke-Pester -Output Detailed ${{ matrix.test }}

      - name: Upload systemd verify logs 📤
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: systemd-verify-logs-${{ matrix.test }}
          path: artifacts/systemd-verify.txt
